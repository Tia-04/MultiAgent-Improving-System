# sonar-project.properties
# These are defaults. The SonarService overrides projectKey and sources via CLI flags.

sonar.projectKey=llm-eval
sonar.projectName=LLM Java Evaluation
sonar.sourceEncoding=UTF-8

# Only scan Java files
sonar.inclusions=**/*.java
sonar.exclusions=**/*.py,**/*.md,**/*.json,**/*.yml,**/*.yaml,**/*.sh,**/*.c,**/*.html,**/*.css

sonar.scm.disabled=true
sonar.java.binaries=.
